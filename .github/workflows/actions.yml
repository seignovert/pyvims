name: Github Actions

env:
  PACKAGE: pyvims
  PYTHON: '3.10'

on:
  pull_request:
  push:
    paths:
    - '**.py'
    - '!**/__version__.py'
    - 'pyproject.toml'
    - '.github/workflows/actions.yml'

jobs:
  linter:
    name: Ruff
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Set up Python ${{ env.PYTHON }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON }}

    - name: Ruff check
      run: uv run --only-group linter ruff check

    - name: Ruff format
      run: uv run --only-group linter ruff format --diff

  tests:
    name: Pytest
    runs-on: ubuntu-latest
    env:
      PYTEST_ADDOPTS: --color=yes

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        lfs: true

    - name: Checkout LFS objects
      run: git lfs checkout

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Set up Python ${{ env.PYTHON }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON }}

    - name: Run pytest without coverage (for now)
      run: uv run --only-group tests --with . pytest

    - name: Test Jupyter notebooks
      run: uv run --only-group tests --with . pytest --nbval-lax notebooks/

  pypi:
    name: Deploy to PyPI
    if: contains(github.ref, 'refs/tags/')
    needs: [linter, tests]
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        lfs: true

    - name: Checkout LFS objects
      run: git lfs checkout

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Set up Python ${{ env.PYTHON }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON }}

    - name: Build package with UV
      run: uv build

    - name: Push to PyPI
      env:
        UV_PUBLISH_USERNAME: __token__
        UV_PUBLISH_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      run: uv publish --verbose

  release:
    name: Release to Github
    needs: pypi
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        lfs: true

    - name: Checkout LFS objects
      run: git lfs checkout

    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
